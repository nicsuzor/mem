name: "Agent: Merge Prep (Shim)"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to prepare'
        type: string
        required: true
      force:
        description: 'Skip self-loop detection'
        type: boolean
        default: false
      # Must mirror workflow_call.inputs — the cron dispatcher uses
      # `gh workflow run` (workflow_dispatch) and passes bot_identity.
      # Without this declaration the API returns HTTP 422 "Unexpected inputs".
      bot_identity:
        description: 'Identity of the bot'
        type: string
        default: 'github-actions[bot]'
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to prepare'
        type: string
        required: true
      force:
        description: 'Skip self-loop detection'
        type: boolean
        default: false
      bot_identity:
        description: 'Identity of the bot'
        type: string
        default: 'github-actions[bot]'

jobs:
  merge-prep:
    # Must match (or exceed) the permissions block in the called workflow's
    # `fix` job. Without an explicit grant here, default-restrictive repo
    # settings drop GITHUB_TOKEN to `*: none` and GitHub refuses to start
    # the run at registration. See merge-prep-cron.yml shim for the same
    # constraint on the dispatcher side.
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    # Reusable workflow from academicOps
    uses: nicsuzor/academicOps/.github/workflows/agent-merge-prep.yml@pipeline-v1
    with:
      pr_number: ${{ inputs.pr_number }}
      force: ${{ inputs.force }}
      bot_identity: ${{ inputs.bot_identity || 'github-actions[bot]' }}
    secrets:
      AOPS_BOT_GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
