# Agent: Assessor (Curia)
# Personality: Strategic reviewer who fixes what it can and flags what it can't.
# Responsibilities:
#   - Review PR diff for strategic alignment and assumption hygiene
#   - Push fixes for mechanical issues directly to the PR branch
#   - Comment briefly on issues requiring human judgment
#   - File gh pr review (APPROVE or REQUEST_CHANGES)
# Prompt: .github/agents/assessor.agent.md
# Curia: Assessor (GitHub surface). Local: .agent/skills/critic/SKILL.md
#
# See specs/pr-pipeline.md for the full process documentation.

name: "Agent: Auto Review & Fix"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review and fix'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review and fix'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  review-and-fix:
    name: Review & Fix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: agent-review-fix-${{ inputs.pr_number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    steps:
      - name: Determine PR info
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        id: pr-info
        run: |
          if [ -n "$INPUT_PR_NUMBER" ]; then
            # Called via workflow_call or workflow_dispatch — use inputs directly

            # The 'gh pr view' command requires a local git repository.
            # Initialize a bare one if necessary before running gh
            if [ ! -d .git ]; then
              git init
              git remote add origin ${{ github.server_url }}/${{ github.repository }} || true
            fi

            SHA=$(gh pr view "$INPUT_PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid -q '.headRefOid')
            {
              echo "pr_number=$INPUT_PR_NUMBER"
              echo "ref=$INPUT_REF"
              echo "sha=$SHA"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "pr_number=$EVENT_PR_NUMBER"
              echo "sha=$EVENT_HEAD_SHA"
              echo "ref=$EVENT_HEAD_REF"
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REF: ${{ inputs.ref }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.ref }}

      - name: Set up Python
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Self-loop detection: skip if last commit was from autofix OR merge-prep
      - name: Check if last push was from an agent
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        id: loop-check
        run: |
          LAST_MSG=$(git log -1 --format='%B')
          if echo "$LAST_MSG" | grep -qE '(Autofix-By|Merge-Prep-By):'; then
            echo "Last commit was from an agent — skipping to avoid loop"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]') && steps.loop-check.outputs.skip != 'true'
        run: uv sync --frozen

      - name: Read agent instructions
        if: (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]') && steps.loop-check.outputs.skip != 'true'
        id: prompt
        run: |
          PROMPT=$(cat .github/agents/autofix.agent.md)
          {
            echo "prompt<<AGENT_EOF"
            echo "$PROMPT"
            echo "AGENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Review & Fix
        id: review
        if: (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]') && steps.loop-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
          # Explicit env var so the action's post-step (token revocation) can find it
          # even if the main step is canceled before saving action state.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}

            ---

            Review and fix PR #${{ steps.pr-info.outputs.pr_number }} in repository ${{ github.repository }}.
            PR ref: ${{ steps.pr-info.outputs.ref }}
            PR head SHA: ${{ steps.pr-info.outputs.sha }}
          claude_args: '--model claude-opus-4-6 --allowed-tools "Bash,Edit,Read,Write"'
