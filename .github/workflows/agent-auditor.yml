# Agent: Auditor (Curia)
# Personality: Mechanical compliance checker. Silent unless violations found.
# Responsibilities:
#   - Check PR diff against axioms, heuristics, and project-local rules
#   - Post PR comment ONLY if violations are found
#   - Set "Axiom Review" commit status (success/failure)
# Prompt: .github/agents/auditor.agent.md
# Curia: Auditor (GitHub surface). Local: .agent/skills/custodiet/SKILL.md
#
# This is distinct from "Agent: Assessor" (agent-review-and-fix.yml),
# which handles strategic review and can push fixes.

name: "Agent: Axiom Review"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  axiom-review:
    name: Axiom Review
    runs-on: ubuntu-latest
    concurrency:
      group: axiom-review-${{ inputs.pr_number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.event.pull_request.head.ref }}

      - name: Read agent instructions
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        id: prompt
        run: |
          PROMPT=$(cat .github/agents/auditor.agent.md)
          {
            echo "prompt<<AGENT_EOF"
            echo "$PROMPT"
            echo "AGENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine PR info
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_DATA=$(gh pr view "${{ inputs.pr_number }}" --json number,headRefOid)
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}

      - name: Run Axiom Review
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'github-actions[bot]'
        id: review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}
          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Bash(gh:*),Read"'
