# Agent: Enforcer Review (Shim)
# Personality: Universal standards enforcer — axiom compliance reviewer.
# This shim triggers on the completion of "PR Review Pipeline".

name: "Agent: Enforcer Review (Shim)"

on:
  workflow_run:
    workflows:
      - "PR Review Pipeline"
    types: [completed]
    branches-ignore:
      - main
      - 'release-please*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  enforcer:
    # Reusable workflow from academicOps. @dist auto-advances on every
    # academicOps release (no manual tag step) instead of the retired
    # pipeline-v1 static tag, which never auto-advanced and left this repo
    # running a stale pipeline for weeks (academicOps aops_1a4b8e23).
    uses: nicsuzor/academicOps/.github/workflows/agent-enforcer.yml@dist
    # Note: agent-enforcer.yml extracts PR info from workflow_run context if inputs are empty
    with:
      pr_number: ${{ inputs.pr_number || '' }}
      ref: ${{ inputs.ref || '' }}
    secrets: inherit
