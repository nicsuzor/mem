# PR Review Pipeline
#
# Runs three independent review agents on each open PR:
#   - enforcer: axiom compliance (universal standards)
#   - custodiet: workflow integrity (scope, planning, authorization)
#   - qa: end-to-end verification
#
# Generated by install-review-agents.sh. Re-run to update.

name: "Agent: PR Review"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (leave empty for all open PRs)'
        type: string
        required: false
      ref:
        description: 'Git ref to checkout (required if pr_number is set)'
        type: string
        required: false
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  discover-prs:
    name: Discover PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prs.outputs.matrix }}
      count: ${{ steps.prs.outputs.count }}
    steps:
      - name: List open PRs or use input
        id: prs
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          if [ -n "$INPUT_PR_NUMBER" ]; then
            if [ -n "$INPUT_REF" ]; then
              REF="$INPUT_REF"
            else
              REF=$(gh pr view "$INPUT_PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q '.headRefName')
            fi
            MATRIX=$(jq -nc --arg pr "$INPUT_PR_NUMBER" --arg ref "$REF" '[{pr_number: $pr, ref: $ref}]')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "count=1" >> "$GITHUB_OUTPUT"
          else
            PRS=$(gh pr list --repo "${{ github.repository }}" --state open --json number,headRefName \
              --jq '[.[] | {pr_number: (.number | tostring), ref: .headRefName}]')
            COUNT=$(echo "$PRS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              echo "No open PRs found"
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
            else
              echo "Found $COUNT open PRs"
              echo "matrix=$PRS" >> "$GITHUB_OUTPUT"
              echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            fi
          fi

  review-enforcer:
    name: "Enforcer: PR #${{ matrix.item.pr_number }}"
    needs: discover-prs
    if: needs.discover-prs.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        item: ${{ fromJson(needs.discover-prs.outputs.matrix) }}
      max-parallel: 2
      fail-fast: false
    concurrency:
      group: pr-review-enforcer-${{ matrix.item.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.item.ref }}
          token: ${{ secrets.AOPS_BOT_GH_TOKEN }}

      - name: Loop detection
        id: loop-check
        run: |
          LAST_MSG=$(git log -1 --format='%B')
          if echo "$LAST_MSG" | grep -qE '(Enforcer-By|Custodiet-By|QA-By|Review-By):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read agent prompt
        if: steps.loop-check.outputs.skip != 'true'
        id: prompt
        run: |
          PROMPT=$(cat .github/agents/enforcer.agent.md)
          { echo "prompt<<AGENT_EOF"; echo "$PROMPT"; echo "AGENT_EOF"; } >> "$GITHUB_OUTPUT"

      - name: Run Enforcer
        if: steps.loop-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}

            ---

            Review PR #${{ matrix.item.pr_number }} in repository ${{ github.repository }}.

            1. Read `.agents/CORE.md` from the repo root (if it exists) for local project context.
            2. Run `gh pr view ${{ matrix.item.pr_number }}` to understand the PR.
            3. Run `gh pr diff ${{ matrix.item.pr_number }}` to see the changes.
            4. Apply the review protocol from your instructions above.
            5. Use `gh pr review` to file your review (APPROVE or REQUEST_CHANGES).
               Start the review body with `## Enforcer Review` for identification.

            If you push fixes, use commit trailer: `Enforcer-By: agent`

            PR ref: ${{ matrix.item.ref }}
          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Bash,Edit,Read,Write,Glob,Grep"'

  review-custodiet:
    name: "Custodiet: PR #${{ matrix.item.pr_number }}"
    needs: discover-prs
