name: Publish PKB image to GHCR

# Builds and publishes the PKB MCP server container image to
# ghcr.io/nicsuzor/pkb. Consumed by services-new (docker-compose pull).
#
# Tags:
#   - latest         on every push to main
#   - sha-<short>    every build (immutable reference)
#   - v<version>     when a vX.Y.Z tag is pushed
#
# Image must be marked PUBLIC in GHCR settings after the first push so
# services-new can pull without auth.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "models/**"
      - "Dockerfile"
      - ".dockerignore"
      - "containers/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nicsuzor/pkb
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
