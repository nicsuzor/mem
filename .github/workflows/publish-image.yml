name: Publish PKB image to GHCR

# Builds and publishes the PKB MCP server container image to
# ghcr.io/nicsuzor/pkb from a prebuilt binary in a GitHub release.
# No Rust toolchain — the binary is downloaded from the release asset.
#
# Triggers:
#   - workflow_call       — chained from release-please.yml / manual-release.yml
#   - release.published   — fires if release is created with a PAT (not GITHUB_TOKEN)
#   - workflow_dispatch   — manual repackage of an existing release tag
#
# Tags pushed:
#   - latest          (always)
#   - <release-tag>   (e.g. mem-v0.3.59)
#
# Image must be marked PUBLIC in GHCR settings after the first push so
# services-new can pull without auth.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to package (e.g. mem-v0.3.59)"
        required: true
        type: string
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package (e.g. mem-v0.3.59)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find Linux binary asset URL
        id: binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          URL=$(gh release view "$TAG" --json assets \
            --jq '.assets[] | select(.name | endswith("x86_64-linux.tar.gz")) | .url')
          if [ -z "$URL" ]; then
            echo "::error::No x86_64-linux asset found for release $TAG"
            exit 1
          fi
          echo "Found: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nicsuzor/pkb
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PKB_BINARY_URL=${{ steps.binary.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
