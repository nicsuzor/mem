name: Build & Publish Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Version tag for the release"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
  # Allow manual recovery for a tag whose release exists but is missing
  # binaries (e.g. when the gated build-release was skipped after a cancelled
  # release-plz run created the tag+release ahead of the next push). The
  # release-plz workflow also auto-detects this and re-fires build-release.
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag for the release (e.g. v0.3.19)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: x86_64-linux
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          TAG="${{ inputs.tag }}"
          ARCHIVE="mem-${TAG}-${{ matrix.artifact }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/release pkb
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: mem-*.tar.gz
