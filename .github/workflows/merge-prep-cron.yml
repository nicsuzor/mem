name: "Merge Prep Dispatcher (Shim)"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_run:
    workflows:
      - "PR Review Pipeline"
    types: [completed]
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Override: process specific PR'
        type: string
        required: false

jobs:
  dispatch:
    # Required: a calling job cannot grant the reusable workflow MORE
    # permissions than itself. With default-restrictive repo settings the
    # GITHUB_TOKEN comes through as `actions: none, pull-requests: none,
    # statuses: none` and GitHub refuses to start the run with:
    #   "The nested job 'dispatch' is requesting 'actions: write,
    #    pull-requests: read, statuses: read', but is only allowed
    #    'actions: none, pull-requests: none, statuses: none'."
    # These must match (or exceed) the permissions block in the called
    # workflow's `dispatch` job.
    permissions:
      contents: read
      pull-requests: read
      statuses: read
      actions: write
    # Reusable workflow from academicOps
    uses: nicsuzor/academicOps/.github/workflows/merge-prep-cron.yml@pipeline-v1
    with:
      pr_number: ${{ inputs.pr_number }}
      workflow_ref: 'agent-merge-prep.yml' # Filename of the agent shim in consumer repo
      bot_identity: 'github-actions[bot]'
    secrets: inherit  # passes GITHUB_TOKEN and any org/repo secrets the called workflow needs
